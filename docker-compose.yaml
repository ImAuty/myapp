services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: myapp_db
      POSTGRES_USER: auty
      POSTGRES_PASSWORD: auty
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/myapp_db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      API_BASE_URL_INTERNAL: http://backend:8080
volumes:
  db_data: